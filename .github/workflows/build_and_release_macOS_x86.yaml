name: Build and release Aseprite (macOS self-hosted)

on:
  push:
    branches:
      - main
    paths:
      - 'BuildLog.md'
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  # 直接获取最新版本号，无任何第三方 Action
  fetch-aseprite-info:
    name: Fetch latest tag
    runs-on: self-hosted  # 👈 你的本机
    outputs:
      release-tag: ${{ steps.latest.outputs.tag }}
    steps:
      - name: Get Aseprite latest release
        id: latest
        run: |
          TAG=$(curl -s https://api.github.com/repos/aseprite/aseprite/releases/latest | jq -r ".tag_name")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create Release
    runs-on: self-hosted
    needs: fetch-aseprite-info
    permissions:
      contents: write
    outputs:
      release-tag: ${{ needs.fetch-aseprite-info.outputs.release-tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.fetch-aseprite-info.outputs.release-tag }}
          body: Aseprite ${{ needs.fetch-aseprite-info.outputs.release-tag }}
          skipIfReleaseExists: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-aseprite:
    name: Build Aseprite
    needs: create-release
    permissions:
      contents: write
    runs-on: self-hosted  # 👈 核心：使用你本机
    steps:
      - uses: actions/checkout@v4

      # 确保本机有编译工具（没有会自动安装）
      - name: Install dependencies
        run: |
          brew install cmake ninja p7zip wget jq

      # 下载源码
      - name: Clone Aseprite
        run: |
          git clone --recurse-submodules https://github.com/aseprite/aseprite --branch ${{ needs.create-release.outputs.release-tag }}

      # 下载 Skia
      - name: Install Skia
        working-directory: aseprite
        run: |
          wget https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-macOS-Release-x64.zip
          unzip Skia-macOS-Release-x64.zip -d skia

      # 编译配置
      - name: CMake Generate
        working-directory: aseprite
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15 \
            -DENABLE_TESTS=OFF \
            -DENABLE_SCRIPTING=ON \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$(realpath skia) \
            -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-x64)

      # 开始编译
      - name: Build
        working-directory: aseprite
        run: ninja -C build

      # 清理打包
      - name: Package
        working-directory: aseprite/build/bin
        run: |
          echo '# Portable' > aseprite.ini
          7z a Aseprite-${{ needs.create-release.outputs.release-tag }}-macOS.zip *

      # 上传
      - name: Upload to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: aseprite/build/bin/Aseprite-${{ needs.create-release.outputs.release-tag }}-macOS.zip
          asset_name: Aseprite-${{ needs.create-release.outputs.release-tag }}-macOS.zip
          tag: ${{ needs.create-release.outputs.release-tag }}
          overwrite: true
